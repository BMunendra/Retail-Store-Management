<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,600;0,700;1,100&display=swap" rel="stylesheet">
</head>
<body>
    <section class="header">
        <nav>
            <a href="#"><img src="/images/smartlogo2.jpg"></a>
            <div class="nav-items">
                <ul>
                    <li><a href="/Pages/homepage.html">HOME</a></li>
                    <li><a href="/Pages/products.html">PRODUCTS</a></li>
                    <li><a href="/Pages/cart.html">CART</a></li>
                    <li><a href="/Pages/aboutus.html">ABOUT US</a></li>
                    <li><a href="/Pages/contactus.html">CONTACT US</a></li>
                    <li><a href="/Pages/products.html"><ion-icon name="search"></ion-icon></a></li>
                    <li><a href="#"><ion-icon name="notifications"></ion-icon></a></li>
                    <button id="nav-login">LOGIN/SIGN UP</button>
                </ul>
            </div>
        </nav>
    <div class="wrapper">
        <span class="icon-close">
            <ion-icon name="close"></ion-icon>
        </span>
        <div class="form-login">
            <h2>Login</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="login-register">
                    <p>Don't have an account?<a href="/Pages/signup.html" class="register-link">Sign Up</a></p>
                </div>
            </form>
        </div>
    </div>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
